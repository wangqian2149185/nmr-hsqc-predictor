model: gcn

# Node feature dimension = max_neighbors × features_per_neighbor
# = 128 × 14 (3 coord_mean + 3 coord_std + 1 in_space + 1 in_seq + 6 element_onehot)
node_feat_dim: 1792

# GCN architecture
hidden_dim: 256
num_layers: 4

# Graph edge construction
spatial_edge_threshold_angstrom: 8.0
sequence_edge_range: 3

# Training
batch_size: 32
epochs: 200
lr: 1.0e-3
weight_decay: 1.0e-4
early_stop_patience: 20

# Flexibility cutoffs (must match custom_embed.yaml)
flexibility_cutoff_angstrom: 1.0
neighbor_flexibility_cutoff_angstrom: 1.5
