embedding: custom

# Neighbor definition
neighbor_distance_threshold_angstrom: 5.0   # through-space cutoff from amide N
sequence_neighbor_range: 3                  # i-3 to i+3 residues

# Feature encoding
max_neighbors: 128
elements: [C, N, O, S, H]                  # 5 elements + "other" → 6-dim one-hot

# Flexibility filtering (NMR ensemble only)
flexibility_cutoff_angstrom: 1.0            # max backbone RMSD to include residue
neighbor_flexibility_cutoff_angstrom: 1.5   # max per-atom RMSD for neighbor atoms
